appId: com.ai-docs.app
productName: AI Docs
directories:
  buildResources: build
files:
  - electron/dist/**/*
  - server/**/*
  - client/dist/**/*
  - node_modules/**/*
  - package.json
mac:
  target: dmg
  category: public.app-category.productivity
  icon: electron/icons/icon.icns
win:
  target: nsis
  icon: electron/icons/icon.ico
linux:
  target: AppImage
  icon: electron/icons/icon.png
